name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Release
          - os: macos-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Release
          - os: windows-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      # MSVC + Ninja (no MinGW): cl must be on PATH for configure/build/test.
      - name: Install Ninja
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "install-prefix=${{ github.workspace }}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}

      - name: Configure CMake (Windows MSVC)
        if: runner.os == 'Windows'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install ${{ steps.strings.outputs.build-output-dir }} --prefix ${{ steps.strings.outputs.install-prefix }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest -C ${{ matrix.build_type }}

      - name: Compress binaries unix
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          cd ${{ steps.strings.outputs.install-prefix }}/bin
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            tar czf ${{ github.workspace }}/ladr-linux.tar.gz *
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            tar czf ${{ github.workspace }}/ladr-darwin.tar.gz *
          fi

      - name: Compress binaries windows
        if: matrix.os == 'windows-latest'
        run: |
          cd ${{ steps.strings.outputs.install-prefix }}/bin
          7z a ${{ github.workspace }}/ladr-windows.zip *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ladr-${{ matrix.os }}
          path: |
            ladr-windows.zip
            ladr-linux.tar.gz
            ladr-darwin.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ladr-ubuntu-latest/ladr-linux.tar.gz
            artifacts/ladr-windows-latest/ladr-windows.zip
            artifacts/ladr-macos-latest/ladr-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
